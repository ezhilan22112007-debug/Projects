  // ---------- CORE LOGIC: ONE IDIOM PER CALENDAR DAY ----------
  // We define a "start date" for the 90-day journey.
  // You can change START_DATE to any day you want to begin.
  // By default, the journey starts from the first day this page is opened.
  // But to make it consistent across devices, we store the start date in localStorage.
  
  let START_TIMESTAMP = null;  // will be loaded from localStorage or set to today

  function getOrCreateStartDate() {
    const stored = localStorage.getItem("lid_start_date");
    if (stored) {
      return new Date(parseInt(stored));
    } else {
      // first time user: start today
      const now = new Date();
      now.setHours(0, 0, 0, 0); // normalize to midnight
      localStorage.setItem("lid_start_date", now.getTime().toString());
      return now;
    }
  }

  function getCurrentDayNumber() {
    const start = getOrCreateStartDate();
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diffTime = today - start;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    // Day 1 is start date (diffDays = 0)
    let currentDay = diffDays + 1;
    if (currentDay < 1) currentDay = 1;      // not started yet? show day 1 preview but locked?
    if (currentDay > 90) currentDay = 90;    // cap at 90
    return currentDay;
  }

  function isDayUnlocked(dayNum) {
    const currentUnlocked = getCurrentDayNumber();
    return dayNum <= currentUnlocked;
  }

  function getTodaysIdiom() {
    const todayDay = getCurrentDayNumber();
    // find idiom with day == todayDay
    const idiom = IDIOMS.find(i => i.day === todayDay);
    if (idiom) return idiom;
    // fallback (should never happen)
    return IDIOMS[0];
  }

    const container = document.getElementById("dynamicContent");
    const dayCounterSpan = document.getElementById("dayCounterDisplay");
    if (!container) return;

    const currentDayNum = getCurrentDayNumber();
    const todayIdiom = getTodaysIdiom();
    const totalDays = 90;
    const progressPercent = (currentDayNum / totalDays) * 100;

    if (dayCounterSpan) {
      dayCounterSpan.innerText = `📅 Day ${currentDayNum} of ${totalDays}`;
    }

    // for idioms of current day (always unlocked)
    const idiom = todayIdiom;
    
    // also show if the user tries to peek into future? but we always show only current day idiom.
    // but we provide a message: tomorrow's idiom will appear naturally.
    const isFuture = (currentDayNum > idiom.day) ? false : (idiom.day === currentDayNum);

      </div>

      </div>

      <div class="progress-section">
        <div class="progress-bar-container">
          <div class="progress-fill" style="width: ${progressPercent}%;"></div>
        </div>
        <div class="progress-text">${currentDayNum}/90 days</div>
      </div>

      <div class="calendar-info">
        🗓️ Your journey started on ${formatDate(getOrCreateStartDate())}<br>
        ${currentDayNum < 90 ? `✨ Next idiom unlocks tomorrow! ✨` : `🏆 Congratulations! You've completed all 90 idioms! 🏆`}

      </div>
    `;
    
    container.innerHTML = html;
    
    const resetBtn = document.getElementById("resetJourneyBtn");
    if (resetBtn) {
      resetBtn.addEventListener("click", () => {
        if (confirm("Are you sure? Resetting will set today as Day 1 again. All progress will be lost.")) {
          const newStart = new Date();
          newStart.setHours(0,0,0,0);
          localStorage.setItem("lid_start_date", newStart.getTime().toString());
          // re-render
          renderToday();
          // update day counter display manually
          const newDay = getCurrentDayNumber();
          if(dayCounterSpan) dayCounterSpan.innerText = `📅 Day ${newDay} of 90`;
        }
      });
    }
  }

  function formatDate(date) {
    return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // initialize
  renderToday();
</script>
</body>
</html>
